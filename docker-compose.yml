# Estellebot — local dev compose
# For local dev only. Production deploys via `fly deploy` (see docs/deploy.md).
version: '3.8'

services:
  estellebot:
    build: .
    image: estellebot:local
    container_name: estellebot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
